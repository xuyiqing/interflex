project:
  type: book

book:
  title: "interflex -- User Manual"
  sidebar:
    style: docked
    background: light
  chapters:
    - index.qmd
    - intro.qmd
    - chapter2_classic.qmd
    - chapter3_lasso.qmd
    - chapter5_dml.qmd
    - chapter4_discrete_moderator.qmd
    - chapter6_discrete_outcome.qmd
    - chapter7_plot.qmd
    - references.qmd

initial-block:
  language: r
  file: "init.R"

bibliography: references.bib

format:
  html:
    theme: cosmo
    code-fold: false
    code-tools: true
    code-link: true
    toc: true
    toc-depth: 3
    toc-expand: 4

knitr:
  opts_chunk:
    collapse: true
    comment: "#>"

editor: visual
